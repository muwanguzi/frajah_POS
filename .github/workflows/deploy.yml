name: Deploy to production

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync repository to server
        run: |
          rsync -az --delete \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude '**/node_modules' \
            --exclude 'dist' \
            --exclude '**/dist' \
            --exclude '.turbo' \
            --exclude '.env' \
            --exclude '.env.production' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new" \
            ./ "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/opt/franjah-pos/"

      - name: Build and restart containers
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "cd /opt/franjah-pos && docker compose -f docker-compose.prod.yml up -d --build && docker image prune -f"

      - name: Verify deployment
        run: |
          sleep 10
          curl -fsS "http://${{ secrets.DEPLOY_HOST }}/" -o /dev/null && echo "Web is reachable"
